name: clipcompass
services:
- name: frontend
  type: service
  source_dir: frontend
  dockerfile_path: Dockerfile
  http_port: 3000
  envs:
  - key: NEXT_PUBLIC_API_URL
    scope: RUN_AND_BUILD_TIME
    value: ${BACKEND_URL}
  - key: NODE_ENV
    value: production

- name: backend
  type: service
  source_dir: backend
  dockerfile_path: Dockerfile
  http_port: 8000
  envs:
  - key: QDRANT_HOST
    value: ${qdrant.HOSTNAME}
  - key: QDRANT_PORT
    value: "6333"
  - key: REDIS_URL
    value: ${redis.DATABASE_URL}
  - key: WHISPER_MODEL
    value: base
  - key: CLIP_MODEL
    value: ViT-B/32

- name: celery-worker
  type: worker
  source_dir: backend
  dockerfile_path: Dockerfile
  run_command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
  envs:
  - key: QDRANT_HOST
    value: ${qdrant.HOSTNAME}
  - key: QDRANT_PORT
    value: "6333"
  - key: REDIS_URL
    value: ${redis.DATABASE_URL}
  
databases:
- name: redis
  engine: redis
  version: "7"

- name: qdrant
