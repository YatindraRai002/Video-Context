version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: clipcompass-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - clipcompass-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: clipcompass-redis
    ports:
      - "6379:6379"
    networks:
      - clipcompass-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipcompass-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/clipcompass.db:/app/clipcompass.db
    environment:
      - DATABASE_URL=sqlite:///./clipcompass.db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - CLIP_MODEL=${CLIP_MODEL:-ViT-B/32}
      - TEXT_EMBEDDING_MODEL=${TEXT_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - FRAME_EXTRACTION_FPS=${FRAME_EXTRACTION_FPS:-1.0}
    depends_on:
      - qdrant
      - redis
    networks:
      - clipcompass-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipcompass-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/app/data
      - ./backend/clipcompass.db:/app/clipcompass.db
    environment:
      - DATABASE_URL=sqlite:///./clipcompass.db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - CLIP_MODEL=${CLIP_MODEL:-ViT-B/32}
      - TEXT_EMBEDDING_MODEL=${TEXT_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - FRAME_EXTRACTION_FPS=${FRAME_EXTRACTION_FPS:-1.0}
    depends_on:
      - qdrant
      - redis
      - backend
    networks:
      - clipcompass-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clipcompass-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - clipcompass-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  clipcompass-network:
    driver: bridge

volumes:
  qdrant_storage:


